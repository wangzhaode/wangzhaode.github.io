<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 580" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="12">
  <defs>
    <marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="none" stroke="#333" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="700" height="580" fill="#fff"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Gemma4 PLE Computation Flow</text>
  <text x="350" y="44" text-anchor="middle" font-size="10" fill="#999">Per-Layer Embeddings: dual-path fusion</text>

  <!-- ===== token_ids ===== -->
  <rect x="265" y="60" width="170" height="30" rx="3" fill="none" stroke="#333" stroke-width="1.2"/>
  <text x="350" y="80" text-anchor="middle" fill="#333">token_ids</text>

  <!-- Fork arrows -->
  <line x1="350" y1="90" x2="350" y2="105" stroke="#333" stroke-width="1"/>
  <line x1="350" y1="105" x2="180" y2="120" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
  <line x1="350" y1="105" x2="520" y2="120" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- ===== LEFT PATH: Main Embedding Projection ===== -->
  <text x="180" y="112" text-anchor="middle" font-size="9" fill="#999">Main Embedding Path</text>

  <rect x="80" y="126" width="200" height="52" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="180" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">embed_tokens</text>
  <text x="180" y="162" text-anchor="middle" font-size="10" fill="#888">[vocab_size, hidden_size]</text>
  <text x="180" y="174" text-anchor="middle" font-size="9" fill="#999">(shared with LM Head)</text>

  <line x1="180" y1="178" x2="180" y2="204" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <rect x="60" y="208" width="240" height="44" rx="3" fill="none" stroke="#333" stroke-width="1.2"/>
  <text x="180" y="226" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">per_layer_model_projection</text>
  <text x="180" y="242" text-anchor="middle" font-size="10" fill="#888">Linear: hidden_size -> ple_dim</text>

  <line x1="180" y1="252" x2="180" y2="278" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <rect x="96" y="282" width="168" height="28" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="180" y="301" text-anchor="middle" font-size="11" fill="#666">x hidden_size^(-0.5)</text>

  <line x1="180" y1="310" x2="180" y2="336" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <rect x="60" y="340" width="240" height="44" rx="3" fill="none" stroke="#333" stroke-width="1.2"/>
  <text x="180" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">per_layer_projection_norm</text>
  <text x="180" y="372" text-anchor="middle" font-size="10" fill="#888">RMSNorm</text>

  <line x1="180" y1="384" x2="310" y2="430" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- ===== RIGHT PATH: PLE Lookup ===== -->
  <text x="520" y="112" text-anchor="middle" font-size="9" fill="#999">PLE Lookup Path</text>

  <rect x="400" y="126" width="240" height="52" rx="3" fill="none" stroke="#333" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="520" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">embed_tokens_per_layer</text>
  <text x="520" y="162" text-anchor="middle" font-size="10" fill="#888">[vocab, num_layers x ple_dim]</text>
  <text x="520" y="174" text-anchor="middle" font-size="9" fill="#999">int4 quantized, ~1.4GB on disk</text>

  <line x1="520" y1="178" x2="520" y2="204" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <rect x="420" y="208" width="200" height="44" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="520" y="226" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">reshape</text>
  <text x="520" y="242" text-anchor="middle" font-size="10" fill="#888">[seq, num_layers, ple_dim]</text>

  <!-- Straight down from reshape to fusion -->
  <line x1="520" y1="252" x2="390" y2="430" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- ===== FUSION ===== -->
  <circle cx="350" cy="440" r="16" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="350" y="445" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">+</text>

  <line x1="350" y1="456" x2="350" y2="478" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <rect x="266" y="482" width="168" height="28" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="350" y="501" text-anchor="middle" font-size="11" fill="#666">x 2^(-0.5)</text>

  <line x1="350" y1="510" x2="350" y2="530" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- Output -->
  <rect x="195" y="534" width="310" height="32" rx="3" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="350" y="555" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">per_layer_inputs [seq, L, ple_dim]</text>

  <!-- Annotation: feeds into each decoder layer -->
  <text x="350" y="578" text-anchor="middle" font-size="9" fill="#999">-> Gate Injection at each Decoder Layer</text>
</svg>
